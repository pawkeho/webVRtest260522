<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Web MR Pass-through (iPhone)</title>
    <!-- 1. WebXRポリフィル（iOSで画面を割るために追加） -->
    <script src="https://cdn.jsdelivr.net/npm/webxr-polyfill@latest/build/webxr-polyfill.js"></script>
    <script>
      var polyfill = new WebXRPolyfill();
    </script>
    <!-- 2. A-Frame本体 -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

    <script>
      // -------------------------------------------------------------
      // 【カスタムコンポーネント】カメラ背景システム
      // Three.jsのscene.backgroundにカメラ映像のテクスチャを設定します。
      // -------------------------------------------------------------
      AFRAME.registerComponent('camera-background', {
        init: function () {
          var scene = this.el;
          var video = document.getElementById('camera-stream');

          // sceneがロードされるのを待ってから実行
          if (scene.hasLoaded) {
            this.setupVideo(scene, video);
          } else {
            scene.addEventListener('loaded', this.setupVideo.bind(this, scene, video));
          }
        },

        setupVideo: function (scene, video) {
          // Three.jsのテクスチャとしてビデオを扱う
          var texture = new THREE.VideoTexture(video);
          
          // A-Frame（Three.js）のシーンの背景として、カメラテクスチャを設定
          scene.object3D.background = texture;

          // 背面カメラを取得
          navigator.mediaDevices.getUserMedia({ 
            video: { 
              facingMode: "environment" // 背面カメラを指定
            }, 
            audio: false // 音声は不要
          })
          .then(function(stream) {
            video.srcObject = stream;
            video.play();
          })
          .catch(function(err) {
            console.error("カメラの取得に失敗しました:", err);
            // エラー表示（開発時のデバッグ用）
            alert("カメラを起動できませんでした。HTTPS環境で実行しているか確認してください。");
          });
        }
      });
    </script>
  </head>
  <body>
    <!-- カメラ映像を流し込む隠し要素（ユーザーには見えません） -->
    <video id="camera-stream" autoplay playsinline style="display:none;"></video>

    <!-- シーンにカスタムコンポーネントを適用 -->
    <a-scene camera-background embedded vr-mode-ui="enabled: true">
      
      <!-- 空間に浮かせるオブジェクト -->
      <a-torus-knot position="0 1.5 -3" radius="0.5" radius-tubular="0.05" color="#FF9F43" animation="property: rotation; to: 0 360 0; loop: true; dur: 5000"></a-torus-knot>
      <a-sphere position="1.5 1 -4" radius="0.6" color="#54A0FF"></a-sphere>
      <a-cone position="-1.5 0.8 -3.5" radius-bottom="0.5" radius-top="0.1" height="1.5" color="#EE5253"></a-cone>

      <!-- 地面（パススルーで見せるのでグリッドにする） -->
      <a-grid position="0 0 -5" rotation="-90 0 0" width="10" height="10" color="#FFFFFF" opacity="0.5"></a-grid>

      <!-- カメラ -->
      <a-camera></a-camera>
    </a-scene>
  </body>
</html>
